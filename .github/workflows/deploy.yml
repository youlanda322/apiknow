# ========================================================
# APIKnow - GitHub Pages 自动构建与部署
# ========================================================
# 触发条件：push 到 main 分支，或手动触发
# 执行流程：安装依赖 → 构建文章 → 部署 site/ 到 GitHub Pages
# ========================================================

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'site/content/**'
      - 'site/js/data.js'
      - 'site/css/**'
      - 'site/*.html'
      - 'admin/data/categories.json'
      - 'admin/data/series.json'
      - 'scripts/build.js'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build articles
        run: node scripts/build.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
