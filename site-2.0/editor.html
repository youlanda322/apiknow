<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>文章标签与写作工具 - APIKnow 2.0</title><meta name="description" content="创建文章元数据、自定义标签并导出 Markdown 草稿。"><link rel="icon" href="data:,"><link rel="stylesheet" href="css/v2.css"><script src="js/lucide.min.js" defer></script><script src="js/articles.js" defer></script><script src="js/stations.js" defer></script><script src="js/v2.js" defer></script></head>
<body>
  <header class="topbar"><div class="container topbar-inner"><a class="brand" href="index.html"><span class="brand-mark">API</span><span>APIKnow</span><span class="version">2.0</span></a><nav class="nav" data-nav><a href="index.html">首页</a><a href="stations.html">中转站推荐</a><a href="methodology.html">中转站测评</a><a href="articles.html">深度文章</a><a class="active" href="editor.html">写文章</a></nav><div class="nav-actions"><button class="icon-btn menu-btn" type="button" data-menu aria-label="打开导航" aria-expanded="false"><i data-lucide="menu"></i></button></div></div></header>
  <main><section class="page-hero"><div class="container"><div class="eyebrow">本地写作工具</div><h1>自己添加标签，生成可发布的 Markdown 草稿</h1><p>输入文章信息后按 Enter 添加任意标签。草稿会保存在当前浏览器，也可以下载 Markdown 文件；内容不会上传到服务器。</p></div></section><section class="section section-white"><div class="container editor-layout"><form class="editor-form" data-editor-form><div class="field field-full"><label for="title">文章标题</label><input id="title" name="title" required placeholder="例如：中转站 429 限流怎么测"></div><div class="field"><label for="slug">英文 Slug</label><input id="slug" name="slug" placeholder="relay-api-rate-limit"></div><div class="field"><label for="category">主栏目</label><select id="category" name="category"><option value="relay-review">中转站测评</option><option value="relay-guide">中转站推荐</option><option value="fundamentals">API 基础</option><option value="models">模型与接口</option><option value="practice">实战开发</option><option value="troubleshooting">故障排查</option><option value="industry">行业观察</option></select></div><div class="field"><label for="type">文章类型</label><select id="type" name="type"><option>深度解析</option><option>测评报告</option><option>推荐指南</option><option>实战教程</option><option>避坑指南</option><option>行业观察</option></select></div><div class="field"><label for="disclosure">商业披露</label><select id="disclosure" name="disclosure"><option>无</option><option>含联盟链接</option><option>赞助内容</option><option>商家供稿</option><option>获得测试额度</option></select></div><div class="field field-full"><label for="dek">文章摘要</label><textarea id="dek" name="dek" placeholder="说明问题、适用边界和读者能得到什么。"></textarea></div><div class="field field-full"><label>自定义标签</label><div class="tag-editor"><div data-editor-tags></div><input data-tag-input type="text" placeholder="输入标签后按 Enter"></div><div class="popular-tags" data-popular-tags></div></div><div class="field field-full"><label for="conclusion">先给结论</label><textarea id="conclusion" name="conclusion" placeholder="写三到五条可以验证的结论。"></textarea></div></form><aside class="editor-side"><div class="preview-card" data-editor-preview></div><textarea class="editor-output" data-editor-output readonly aria-label="Markdown 输出"></textarea><div class="editor-actions"><button class="btn btn-primary" type="button" data-copy-markdown>复制 Markdown</button><button class="btn" type="button" data-download-markdown>下载 .md</button><button class="btn" type="button" data-clear-draft>清空草稿</button></div></aside></div></section></main>
  <footer class="footer"><div class="container"><div class="footer-grid"><div><strong>APIKnow 2.0</strong><p>浏览器本地写作，不上传文章或标签。</p></div><div><strong>文章</strong><a href="articles.html">查看标签页</a></div><div><strong>规则</strong><a href="methodology.html">测评体系</a></div><div><strong>升级</strong><a href="solutions.html">内容管理选择</a></div></div><div class="footer-bottom"><span>© 2026 APIKnow 2.0</span><span>下载后的 Markdown 可放入 content/03-草稿。</span></div></div></footer>
</body></html>
